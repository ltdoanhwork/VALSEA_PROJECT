<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz room — Lecture2Quiz SEA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sea: { 950: "#0c1222", 900: "#111827", 700: "#1e3a5f", 500: "#0ea5e9" },
            },
          },
        },
      };
    </script>
    <style>
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        50% {
          transform: translateX(6px);
        }
        75% {
          transform: translateX(-4px);
        }
      }
      .shake-once {
        animation: shake 0.45s ease-in-out;
      }
      #confetti-layer {
        pointer-events: none;
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: 40;
      }
      .confetti-piece {
        position: absolute;
        top: -12px;
        width: 10px;
        height: 14px;
        border-radius: 2px;
        opacity: 0.95;
        animation-name: confetti-fall;
        animation-timing-function: linear;
        animation-fill-mode: forwards;
      }
      @keyframes confetti-fall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0.85;
        }
      }
      .glow-ring {
        box-shadow: 0 0 60px rgba(14, 165, 233, 0.25);
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-sea-950 via-[#0f172a] to-sea-700 text-slate-100">
    <div id="confetti-layer" aria-hidden="true"></div>

    <header class="border-b border-white/10 bg-black/20 backdrop-blur-sm">
      <div class="mx-auto flex max-w-3xl flex-wrap items-center justify-between gap-3 px-4 py-4">
        <div>
          <p class="text-xs uppercase tracking-widest text-sky-400/90">Interactive mode</p>
          <p class="text-lg font-bold text-white">Quiz room</p>
        </div>
        <nav class="flex gap-3 text-sm">
          <a href="./index.html" class="rounded-lg bg-white/10 px-3 py-1.5 text-slate-200 hover:bg-white/15">← Study pack</a>
          <button type="button" class="rounded-lg px-3 py-1.5 text-slate-400 hover:bg-white/10" onclick="location.reload()">Reload</button>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-3xl px-4 py-10">
      <!-- Intro -->
      <section id="screen-intro" class="text-center">
        <div class="glow-ring mx-auto mb-8 max-w-md rounded-3xl border border-sky-500/30 bg-gradient-to-b from-white/10 to-white/5 p-10">
          <p class="text-sm text-sky-300">You’re in the quiz arena</p>
          <h1 id="intro-title" class="mt-3 text-3xl font-extrabold tracking-tight text-white">Loading…</h1>
          <p id="intro-subtitle" class="mt-3 text-slate-300"></p>
          <p id="intro-meta" class="mt-4 text-xs text-slate-500"></p>
          <button
            id="btn-start"
            type="button"
            class="mt-8 w-full rounded-2xl bg-gradient-to-r from-sky-600 to-indigo-600 py-4 text-lg font-bold text-white shadow-lg transition hover:brightness-110 active:scale-[0.99]"
          >
            Start — let’s go
          </button>
          <p class="mt-4 text-xs text-slate-500">Tips: use keys <kbd class="rounded bg-black/30 px-1">1</kbd>–<kbd class="rounded bg-black/30 px-1">4</kbd>, then <kbd class="rounded bg-black/30 px-1">Enter</kbd> for next.</p>
        </div>
      </section>

      <!-- Play -->
      <section id="screen-play" class="hidden">
        <div class="mb-6 flex flex-wrap items-center justify-between gap-3 text-sm">
          <div id="q-num" class="font-mono text-sky-300"></div>
          <div class="flex items-center gap-4">
            <span id="streak" class="font-semibold text-slate-400">Streak ×0</span>
            <span class="text-slate-500">⏱ <span id="timer" class="font-mono text-slate-200">0:00</span></span>
          </div>
        </div>
        <div class="h-2 w-full overflow-hidden rounded-full bg-black/30">
          <div id="progress-bar" class="h-full w-0 rounded-full bg-gradient-to-r from-sky-500 to-emerald-400 transition-[width] duration-300 ease-out"></div>
        </div>

        <article class="mt-8 rounded-3xl border border-white/10 bg-white/[0.06] p-6 shadow-xl backdrop-blur md:p-8">
          <p id="q-text" class="text-lg font-medium leading-relaxed text-white md:text-xl"></p>
          <div id="options-grid" class="mt-8 grid gap-3"></div>

          <div id="feedback" class="mt-6 hidden rounded-2xl border border-white/10 bg-black/25 p-4 text-left"></div>

          <button
            id="btn-next"
            type="button"
            class="mt-6 hidden w-full rounded-xl bg-slate-700 py-3 font-semibold text-white hover:bg-slate-600"
          >
            Next →
          </button>
        </article>
      </section>

      <!-- Result -->
      <section id="screen-result" class="hidden text-center">
        <div class="mx-auto max-w-md rounded-3xl border border-emerald-500/30 bg-gradient-to-b from-emerald-900/20 to-black/30 p-10">
          <p class="text-sm uppercase tracking-wide text-emerald-300/90">Session complete</p>
          <p id="score-percent" class="mt-4 text-6xl font-black text-white tabular-nums">0%</p>
          <p id="score-label" class="mt-4 text-slate-300"></p>
          <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
            <button id="btn-retry" type="button" class="rounded-xl bg-sky-600 px-6 py-3 font-semibold text-white hover:bg-sky-500">Play again</button>
            <a
              href="./flashcards.html"
              class="inline-flex items-center justify-center rounded-xl border border-teal-500/40 bg-teal-500/15 px-6 py-3 font-semibold text-teal-100 hover:bg-teal-500/25"
              >Spaced repetition deck →</a
            >
            <a
              id="btn-home"
              href="./index.html"
              class="inline-flex items-center justify-center rounded-xl border border-white/20 px-6 py-3 font-semibold text-slate-200 hover:bg-white/5"
              >Back to upload</a
            >
          </div>
          <div id="deck-cta" class="mx-auto mt-6 hidden max-w-md rounded-xl border border-teal-500/35 bg-teal-950/40 px-4 py-3 text-left text-sm">
            <p id="deck-cta-text" class="text-teal-100/95"></p>
            <a href="./flashcards.html" class="mt-2 inline-block text-xs font-semibold text-teal-300 underline-offset-2 hover:underline"
              >Open deck — flip cards & schedule reviews →</a
            >
          </div>
        </div>
        <div class="mt-10 text-left">
          <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-400">Review misses</h2>
          <div id="review-list" class="space-y-2"></div>
        </div>
      </section>
    </main>

    <script src="./study-deck.js"></script>
    <script src="./quiz-app.js"></script>
  </body>
</html>
